version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: swais_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: swais
      POSTGRES_PASSWORD: swais_secret
      POSTGRES_DB: swais_saraswathi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swais -d swais_saraswathi"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swais_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@swais.edu
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
